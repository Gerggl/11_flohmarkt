<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderner Datei Upload | Obsidian UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --bg-main: #020617;
            --card-bg: #0f172a;
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Der bekannte Mesh-Background für die App-Identität */
            background-image:
                radial-gradient(at 0% 0%, #1e1b4b 0px, transparent 45%),
                radial-gradient(at 100% 100%, #312e81 0px, transparent 45%);
            overflow: hidden;
        }

        .upload-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            margin-top: 0;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        /* --- DER HOCHWERTIGE DROP-BEREICH --- */
        .file-input-wrapper {
            position: relative;
            width: 100%;
            height: 240px;
            border: 2px dashed var(--border-glass);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .file-input-wrapper:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.04);
            transform: scale(1.02);
        }

        /* Verstecktes Original-Input */
        #file-upload {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .custom-file-label {
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .file-input-wrapper:hover .upload-icon {
            opacity: 1;
            transform: translateY(-5px);
        }

        /* Dateiname Anzeige */
        .file-name {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 800;
            min-height: 1.2rem;
            /* Verhindert Springen des Layouts */
        }

        /* --- DER SUBMIT BUTTON --- */
        .submit-btn {
            width: 100%;
            margin-top: 40px;
            padding: 22px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: white;
            font-family: inherit;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        .submit-btn:hover {
            background: #4f46e5;
            transform: translateY(-4px);
            box-shadow: 0 25px 50px var(--accent-glow);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <div class="upload-container">
        <h2>Upload</h2>
        <p class="subtitle">Wählen Sie ein Produktbild für Ihre Kollektion.</p>

        <form action="upload_verarbeiten.php" method="POST" enctype="multipart/form-data">
            <div class="file-input-wrapper">
                <div class="upload-icon">✦</div>
                <div class="custom-file-label" id="file-label">
                    Datei wählen
                </div>
                <input type="file" name="meine_datei" id="file-upload" onchange="updateFileName()" required>
            </div>

            <div id="file-name-display" class="file-name">Keine Datei ausgewählt</div>

            <button type="submit" class="submit-btn">Hochladen starten</button>
        </form>
    </div>

    <script>
        function updateFileName() {
            const fileInput = document.getElementById('file-upload');
            const fileNameDisplay = document.getElementById('file-name-display');
            const fileLabel = document.getElementById('file-label');

            if (fileInput.files.length > 0) {
                const name = fileInput.files[0].name;
                // Wenn der Name zu lang ist, kürzen wir ihn elegant
                const displayName = name.length > 25 ? name.substring(0, 22) + "..." : name;

                fileNameDisplay.textContent = displayName;
                fileLabel.textContent = "Bereit";
                fileLabel.style.color = "#6366f1";
            } else {
                fileNameDisplay.textContent = "Keine Datei ausgewählt";
                fileLabel.textContent = "Datei wählen";
                fileLabel.style.color = "";
            }
        }
    </script>

</body>

</html>
